<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>World.io - Dev Proje</title>
    <style>
        body { margin: 0; overflow: hidden; background: #050505; color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        canvas { display: block; }
        #ui { position: fixed; top: 20px; left: 20px; pointer-events: none; }
        .stat { font-size: 24px; font-weight: bold; text-shadow: 2px 2px #000; color: #00ffcc; }
    </style>
</head>
<body>

    <div id="ui">
        <div class="stat">Dünya Çapı: <span id="size">20</span></div>
        <div class="stat">Puan: <span id="score">0</span></div>
    </div>

    <canvas id="game"></canvas>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const scoreEl = document.getElementById('score');
const sizeEl = document.getElementById('size');

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

// OYUN AYARLARI
const WORLD_SIZE = 3000; // Devasa harita boyutu
let score = 0;

let player = {
    x: WORLD_SIZE / 2,
    y: WORLD_SIZE / 2,
    radius: 20,
    color: '#3498db',
    speed: 4
};

let foods = [];
let bots = [];
let mouse = { x: canvas.width / 2, y: canvas.height / 2 };

// Başlangıçta 200 tane yemek oluştur
for(let i=0; i<200; i++) spawnFood();
// 10 tane bot oluştur
for(let i=0; i<10; i++) spawnBot();

function spawnFood() {
    foods.push({
        x: Math.random() * WORLD_SIZE,
        y: Math.random() * WORLD_SIZE,
        radius: 5,
        color: `hsl(${Math.random() * 360}, 70%, 60%)`
    });
}

function spawnBot() {
    bots.push({
        x: Math.random() * WORLD_SIZE,
        y: Math.random() * WORLD_SIZE,
        radius: Math.random() * 30 + 10,
        color: '#e74c3c',
        vx: (Math.random() - 0.5) * 2,
        vy: (Math.random() - 0.5) * 2
    });
}

window.onmousemove = (e) => {
    mouse.x = e.clientX;
    mouse.y = e.clientY;
};

function update() {
    // Oyuncuyu fareye doğru hareket ettir (Dünya sınırları içinde)
    let dx = mouse.x - canvas.width / 2;
    let dy = mouse.y - canvas.height / 2;
    let angle = Math.atan2(dy, dx);
    
    player.x += Math.cos(angle) * player.speed;
    player.y += Math.sin(angle) * player.speed;

    // Sınır kontrolleri
    player.x = Math.max(player.radius, Math.min(WORLD_SIZE - player.radius, player.x));
    player.y = Math.max(player.radius, Math.min(WORLD_SIZE - player.radius, player.y));

    // Yemek yeme kontrolü
    foods.forEach((food, index) => {
        let dist = Math.hypot(player.x - food.x, player.y - food.y);
        if (dist < player.radius + food.radius) {
            foods.splice(index, 1);
            score += 10;
            player.radius += 0.5;
            spawnFood();
        }
    });

    // Botların hareketi
    bots.forEach(bot => {
        bot.x += bot.vx;
        bot.y += bot.vy;
        if(bot.x < 0 || bot.x > WORLD_SIZE) bot.vx *= -1;
        if(bot.y < 0 || bot.y > WORLD_SIZE) bot.vy *= -1;
    });

    // Arayüzü güncelle
    scoreEl.innerText = score;
    sizeEl.innerText = Math.floor(player.radius);
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    ctx.save();
    // Kamerayı oyuncuya odakla
    ctx.translate(canvas.width / 2 - player.x, canvas.height / 2 - player.y);

    // Izgara (Grid) çizimi - Harita hissi için
    ctx.strokeStyle = '#222';
    for (let i = 0; i <= WORLD_SIZE; i += 100) {
        ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, WORLD_SIZE); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(0, i); ctx.lineTo(WORLD_SIZE, i); ctx.stroke();
    }

    // Yemekleri çiz
    foods.forEach(food => {
        ctx.beginPath();
        ctx.arc(food.x, food.y, food.radius, 0, Math.PI * 2);
        ctx.fillStyle = food.color;
        ctx.fill();
    });

    // Botları çiz
    bots.forEach(bot => {
        ctx.beginPath();
        ctx.arc(bot.x, bot.y, bot.radius, 0, Math.PI * 2);
        ctx.fillStyle = bot.color;
        ctx.fill();
    });

    // Oyuncuyu çiz
    ctx.beginPath();
    ctx.arc(player.x, player.y, player.radius, 0, Math.PI * 2);
    ctx.fillStyle = player.color;
    ctx.fill();
    ctx.lineWidth = 5;
    ctx.strokeStyle = 'white';
    ctx.stroke();

    ctx.restore();

    update();
    requestAnimationFrame(draw);
}

draw();
</script>
</body>
</html>
