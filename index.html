<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Purnahub | Özel</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; font-family: sans-serif; color: white; }
        
        /* Arka plan videosu ayarları */
        #bg-video {
            position: fixed; right: 0; bottom: 0; min-width: 100%; min-height: 100%;
            z-index: -1; object-fit: cover; filter: brightness(40%); /* Videoyu hafif karartır */
        }

        .container { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; }
        
        #login-box, #content { background: rgba(0, 0, 0, 0.7); padding: 30px; border-radius: 20px; backdrop-filter: blur(10px); border: 1px solid #444; }
        #content { display: none; width: 80%; max-width: 600px; text-align: center; }
        
        img { width: 100%; border-radius: 10px; margin-bottom: 20px; }
        input { padding: 12px; border-radius: 5px; border: none; width: 200px; margin-bottom: 10px; }
        button { padding: 12px 25px; background: #e50914; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <video autoplay muted loop id="bg-video">
        <source src="2026-01-22_dazzflimm_-_goodlinedvenomoussnake.mp4" type="video/mp4">
    </video>

    <div id="login-box">
        <h2>Purna.net</h2>
        <input type="password" id="pass" placeholder="Şifreni gir...">
        <button onclick="checkPassword()">Giriş Yap</button>
    </div>

    <div id="content">
        <h3>Özel Galerim</h3>
        <img src="IMG_5588.webp" alt="Fotoğraf">
        <p>Proje v1.0 - Yerel ve Güvenli</p>
    </div>

    <script>
        function checkPassword() {
            var password = document.getElementById("pass").value;
            if (password == "1234") { // Buradan şifreni değiştir
                document.getElementById("login-box").style.display = "none";
                document.getElementById("content").style.display = "block";
            } else {
                alert("Hatalı şifre!");
            }
        }
    </script>
</body>
</html>
